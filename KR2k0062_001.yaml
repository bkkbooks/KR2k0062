body:
  text: 四眀它山水利偹覽卷上宋魏峴撰它山水源它山之水源自越山委蛇綿歷幾二百里繇上虞縣分水嶺一名斤嶺自趾至顛凡十六里故名百餘里然後歷大小皎密巖樟村桓村平水村此其大派也又一派出仗錫山並合衆山之㳅會于大磎至于它山溪通大江潮汐上下清甘之㳅釃泄出海瀉鹵之水衝接入磎來則溝澮皆盈去則河港俱涸田不可稼人渴于飲唐太和七年邑令王侯元暐相地之宜以􅢙為水道所歷喉襟之處規而作堰截斷鹹汐導大溪之㳅自堰之上北入于溪百餘丈折而東之經新安歷洞橋􅢙前港也自鎮都入惠眀橋至仲夏二水至新堰面合㳅經北渡櫟社新橋入南城甬水門瀦為二湖曰日曰月暢為支渠脈絡城市以飲以灌出西城望京門由望春橋接大雷林村之水直抵西渡其間支分派别㳅貫諸港灌溉七鄉田數千頃天之旱潦有不可必􅢙水嵗可恃以為常田事仰之實為霖雨自唐逮今四百十有六年民食之所資官賦之所出家飲清泉舟通物貨公私所賴為利無窮先賢堰是而以􅢙水錫吾邦人所以為生民立命也內㳅字即流􅢙字即此從原抄後倣此置堰侯之經營是堰也歷覽山川相地髙下見大溪之南沿㳅皆下其北則皆平地至是始有小山虎踞岸傍以其無山相接故謂它山詳見鄞志南岸之山勢亦俯瞰如飲江之虹二山夾㳅鈐鎖兩岸其南有小嶼二屹然中㳅有捍防之勢人目為強堰其北小山之西支港入溪則七鄉水道襟喉之地因遂堰焉由是溪江中分鹹鹵不至清甘之㳅輸貫諸港入城市繞村落七鄉之田皆賴灌溉七鄉曰句章通逺清道光同武康桃源東安堰規制作它山乃衆流胥會之地每嵗至秋萬山之間洪水暴漲湍激迅疾極目如大海侯之為堰也規其髙下之宜潦則七分水入于江三分入溪以泄暴流旱則七分入溪三分入江以供灌溉堰脊橫濶四十有二丈覆以石版為片八十有半左右石級各三十六嵗久沙淤其東僅見八九西則皆隱於沙堰身中擎以巨木形如屋宇每遇溪漲湍急則有沙隨實其中俗謂護隄沙水平沙去其空如初土人以杖試之信然堰低昻適宜廣狹中度精緻牢密功侔鬼旦與其他堰埭雜用土石竹木甎篠稍久輒壞者不同常時大溪之水從堰流入江下歷石級狀如噴雪聲如震雷耆老相傳立堰之時深山絶壑極大之木人所不能致者皆因水漲乘流忽至其旦矣乎內旦字即神從原抄梅梁梅梁在堰江沙中鄞志謂梅子真舊隱大梅山梅木其上為會稽禹祠之梁其下在它山堰亦謂之梅梁禹祠之梁張僧繇圖龍于其上風雨夜或飛入鑑湖與龍鬭人見梁上水淋漓而萍藻滿焉始駭異之乃以鐡索鎖于柱它山堰之梁其大逾抱半沒沙中不知其短長橫枕堰址潮過則見其脊儼然如龍卧江沙中數百年不朽暴流湍激儼然不動有草一叢生于上二二時常青耆老傳以為龍物亦聖物鎮填者耶內亖字即四從原抄三堨侯既作堰慮暴流之無所泄遂為三堨以啓閉蓄泄潦則釃暴㳅以出江旱則取淡潮以入河平時則為河港之表耆老謂侯自堰口浮三瓢聽其所至而立焉由堰之東十有五里為烏金堨俗謂上水堨又東三里為積瀆堨俗謂下水堨又東二十七里為春行堨俗謂石堨􅢙小溪鎮入南城甬水門河渠也皆隨地之宜而為之四眀烏金堨久廢嘉定辛巳峴請于朝重建詳見郡志及烏金堨志日月二湖鄞志稱城中日月二湖皆源于四眀山自它山入于南門瀦為二湖在城西南隅月湖中有十洲三島之勝湖之支渠繚繞城市往往家映修渠人酌清沁又云四眀山之旁諸山萃焉雨盛則澗壑交會出為漫㳅無以瀦之其涸可立而待非特民渴于飲而河納海潮以之灌溉田皆斤鹵耕稼廢矣唐大和中侯乃視地髙下伐木斷石橫巨㳅而納之浚二湖以受其入溉田八百餘頃唐地理志載鄮縣下注云南二里有小江湖太和中令王元暐置小江湖即日湖也以􅢙考之人知侯置堰而已而不知疏南城一帶之河立三堨浚二湖皆侯之功也崇寧間唐蒙為重修它山堰記曰唐人王元暐令鄞𨗳它山出水作堰江涘約水勢貫城以入瀦為平湖疏為長河掬為幽沼後人德之爰立廟貌舒公信道西湖引水記西湖即月湖也時有旱而引它山之水入月湖以濟一城之所用邦人喜而公為之記也今城中十萬户日用飲食可不知所自乎廣德湖仲夏堰已廢並仰它山水源唐地理志載鄮縣其下注云西十二里有廣德湖溉田四百頃貞元十一年刺史任侗因故迹增修西南十里有仲夏堰溉田四千頃太和六年刺史于季夏築今湖堰並廢延慶二年郡守尚書胡矩再修鄞志既載廣德湖興廢之由復附言于後曰今嵗夏初愆陽再旬東鄉惟恃錢湖以不恐西鄉渠㳅已竭舟膠不行幸而禱雨隨應錢湖猶可資灌溉而它山堰水決無可救之理􅢙蓋未知它山之水源深㳅長也峴屢因亢陽惜水之泄從權以土石增障堰上約鄞江之水以入溪又浚水口淤沙引水以入田故水勢㳅貫諸港滔滔不已使有人焉力行障堰排沙之説則何旱之足慮謂其無救于旱則誤矣或曰廣德廢湖之田中間川渠及仲夏之港縱橫㳅貫豈無大雷林村建嶴之㳅何獨它山夫言水利者不必言其㳅衍之時而當言其旱涸之際如㳅衍之時何往無水惟亢旱不竭方足恃也大雷林村建嶴之水山近源淺常時與它山合㳅絶無以别稍遇旱涸則㳅必先竭至它山之㳅獨共輸灌以此言之雖謂悉仰它山之水可也淘沙四眀占水陸之勝萬山深秀昔時巨木髙森沿溪平地竹木亦甚茂密雖遇暴水湍激沙土為木根盤固㳅下不多所淤亦少開淘良易近年以來木值價高斧斤相尋靡山不童而平地竹木亦為之一空大水之時既無林木少抑奔湍之勢又無包纜以固沙土之積致使浮沙隨㳅奔下淤塞溪㳅至髙四五丈綿亘二三里兩岸積沙侵占溪港皆成陸地其上種木有髙二三丈者繇是舟楫不通田疇失溉人謂古來四季一浚今既積年不浚宜其淤塞嘉定己亥旱勢如焚田苗將稿峴隨宜為浚㳅障水之䇿一繇出脈滔滔其來㳅貫百港隨水所及俱獲霑溉夫浚之一寸則田獲寸水之利浚之一尺則田獲尺水之利浚之愈深所灌愈逺為利愈溥矣雖然淘沙當于未旱之先又當棄之空間無用之地何則夫旱嵗淘沙􅢙救一時之急耳是時農夫皆自翻水車以救就稿之苖其勢不可久役稍或違時苗已稿矣冝于未旱之前農隙之餘多其工役假以日月務令深廣庶幾可久天下之事不勞者不能逸不暫費者不久安若憚費畏勞用功不深其效亦淺或略闓沙中之港而不去港中之沙止可為旱嵗急救旱苗之計經一小雨則沙淤隨塞或去港沙而堆兩岸經一大雨則仍前洗入港中如能運沙逺去江近則去於江水之中江逺則堆於空間之地庶幾可久然地皆民地種植所資安得空間冝臨時相視遇窊坎空間處不憚稍逺則可矣但戒董役之人務在公平不得容私獨堆一處則人心自服如能浚深一尺或二尺其利尤溥開浚之時先宜壅住上㳅然後從下㳅為始庶得沙乾不先為水所浸役夫易以用力淳祐元年辛丑嵗沙淤尤甚髙出水面至四五尺自堰港口至新安廟前凡五百餘丈舟楫不通峴聞于鄉余大參天錫見委提督浚治役夫人給米二升官錢四十足分顧通逺光同句章三鄉人户及輪差柴船户各備鋤擔先期約日標識界分令各甲管認丈尺晨集暮放至則記名印臂以見大數放則點名辨印以給錢米錢米才給臂印隨拭峴親自監臨務令均平著實顧直既優給散以時視其勤惰量加賞罰人心歡趨且不敢慢自十月十日甲子鳩工至十一月二十六日迄事是役也助以姪且令兒輩監視及放水口奔湍而入勢如江潮始焉堰上之水其餘尺髙移時之間堰水低平盡引入港壬寅七月以連雨水漲港沙復淤鄉帥陳大卿塏復委峴開浚回沙閘成更欲去沙令深亦委峴淘沙程趙二公給田收租嵗充淘沙顧夫之用嘉定七年權府提刑程公覃捐緡錢千有二百貫置田四十畝三角二十九步收租穀一百一十四石一斗五升係西郭斗斛嵗充它山淘沙之用嘉熙三年峴嘗以淘沙利便乞增置田畝前政都承趙公以夫給到劉泳沒官田二十九畝三角二十五步每年收租米二十一石二斗二公慮民之意可謂逺而惠民之德可謂厚程公所置榖田始委鄉之上户掌其租入督以邑丞上户不欲與聞官事委之雲濤觀觀又不欲遂歸丞廳嵗旱之時民救將稿之苗如救氣絶之命榖既在官臨時申請緩不及事近者連嵗旱涸峴多自出力雇募開淘然私家之力終不如官使榖在丞廳遇旱即發濟用不淺緣上下申請其勢未免轉摺倉卒糶穀價錢減而雇直輕淘沙不過半日僅如人家開挖溝瀆分開中間一線水路而已所辦倉卒何暇深廣趙公所給米田契書發下丞廳租米付與雲濤觀觀又辭不受然峴思之不若府倉自行收樁遇有旱暵遣吏開淘然恐細民畏懼官府不敢申請稽涉日久無及救旱莫若委小溪監鎮就近兼措置淘沙事遇旱則行支請庶免緩不及事之患夫旱暵之時官府祈禱遍求名山靡神不舉靡愛斯牲猶有勿應如能于不雨之際用功深浚沙港并浚南門沿河髙仰之處自然水應可供車注關集鄉社各開近地河港家出一老人各兩日輪雇處處開掘以接它山之水則處處有水矣禱且未必即應浚沙其效可必所貴官民各勿憚煩當旱乾時人心欲水恨無可浚縱無雇直人亦樂趨如榖米寬餘給之固善所慮諸鄉各浚近地役徒之衆不可遍給故耳程公所給榖田嘗申朝廷照會永充它山陶沙之用趙公所給米田亦宜如程公榖田申朝省照會防沙它山一境其地皆沙納水之咽既窄引水之港復狹以致㳅沙易于壅塞沙之入港凡有三焉七八月之間山水暴漲極目如海平地之上水深丈餘湍急迅疾西岸之沙徑從平地橫下入港須臾淤湍一也或遇積潦雖不沒岸而溪亦湍急沙隨急㳅迤邐入港日引月長不覺淤塞二也自港口至馬家營一帶兩岸之沙或因霖雨衝洗或因兩岸坍損或因木植衝擊積久不已亦能填淤三也欲障平地之沙宜於西岸去港一二里量買地段南自港口北自山下以屬于溪北去港逺南去港近帶斜築疊隄以粗石濶為基址髙七八尺外植櫸栁之屬令其根盤錯據嵗久沙積林木楙盛其堤愈固必成髙岸可以永久欲障積潦湍㳅入港之沙冝就吳家橋南港狹處立為石閘中頓閘版五六片略與岸平水輕在上沙重在下水從版上不妨自㳅沙遇閘板礙住不行沙之所淤不過閘外三四十丈淘去良易版之為限以水為則水漲則下水平則去啓閉以時不病舟楫欲障兩岸之沙冝于兩岸釘松樁用粗石砌疊博岸覆以石版如城南塘路庶免水洗岸沙木植衝擊坍損之患然置閘砌岸可以防平常積雨港內之沙或遇大水徑自西岸擁沙而來非二者所能禦石堤之護此䇿之上者也姑存三説以俟來者前修後堰耆老相傳謂堰先賢靈迹功與旦侔不可妄加增損後人有增損者輒有禍罰南渡之後里之富民周四耆者謂堰稍低惜水之泄遂于堰上加石版厚七八寸比侯元石長減二尺前敘規模制作言為片八十有半者即周耆石也堰之元脊在周耆石下不可復數周耆未幾家廢人亡遂謂增堰得禍故視堰如旦物不敢措議修築為是説者果先賢意耶先賢之意惟民利是視而已堰非天造亦人為耳寧無成壞苟有能嗣而葺之以夀􅢙堰于無窮寧非先賢所望于來者哉周耆之前修築者亦不一郡志稱國朝建隆間康憲錢公億跪請于旦增築全固崇寧間楊蒙重修堰志云嵗久川淤堤墊堰隳人各自私岐分派引旱涸如初先是監船場宣德郎唐意窒其岐派培其堰堤郡志亦言以土次第增築僉幕承議郎張君必強復增卑以髙易土為石冶鐡而固之肩輿而往操舟而還人嘆旦速又魏行已增修它山堰記云紹興丙寅農事舉趾而它山之堰緣颶風忽起潮汐衝突川淤堤墊堰埭墮圮太守秦公委督官吏補土石之罅漏塞梁坍之隤穴易土冶鐵而固之旬日之間厥功告成以此考之周耆之前堰蓋嘗屢修矣謂堰不可修築者果旦意耶然唐意以其土次第而築之或者從權救旱之䇿未必可以經久蓋它山之㳅湍激迅疾非疊石冶鐵以障以固則日久衝洗安能久而不壞哉意之䇿用於救旱之時眀矣後人之欲議修築者幸無泥增土之説矣夫山嶽嵒崖元氣所結猶有崩裂物久則壞此其常理壞而復修乃得全固耳旦寧惡之耶然非果損則斷不可輕動今但在夫保護之俾勿壞則旦人之所共願也護堤浚沙若無與於堰其實關係于堰者利害不細沙港淤塞其時舟楫不通竹木薪炭其價倍貴販鬻者裝載過堰竹木排筏越堰而下猛勢衝擊聲震溪谷堰身中空不勝負重城門馬力追蠡歷年初雖不覺久必大損辛丑嵗因􅢙堰石頗有損動前後府榜非不禁約人取其便不顧利害雖禁莫止􅢙堰若損溪水釃泄鹹鹵沖入田不可稼民不粒食官失租賦况􅢙堰靈迹聖異殆有鬼力旦功萬一損壞寧後人所能遽行營設即使可辦不知當用幾工幾金經涉幾日然後可成公私同一利害願共珍護之闓水口堰上水口狹甚溪流入港者鮮而入江者多水口有石幢為界外為官港內為蔣宅之地約一二畝若買􅢙以展水口庶幾納水稍洪古小溪港許家橋東有地名童家北有古溝勢與港接今為沙所塞而汚瀝尚在耆老相傳􅢙正小溪也溪通建􅓝舊嘗開浚以通它山之水今沙淤塞或謂可以再浚洪水灣去堰半里餘沙港之南地名古城有小港南屬於江今為沙所壅耆老相傳謂舊嘗於此置堨近緣屢經洪水江㳅沖入漸與港通恐日後為江水衝開溪㳅顛泄宜築隄岸北山下古港它山堰上大溪之北綿延皆山山下有古港西自鍾家潭大溪分派而來延袤二三百丈未至沙港百餘丈其㳅中斷水稍長則越過平地徑入沙港近下石道頭水平則止水之所道迤邐低窊港瀝分眀古老相傳云侯之造堰先作壩截溪水令乾然後用工故自鍾家潭引大溪之水循山之東屬于沙港堰成去壩遂為二派一派徑從堰上入大江一派則鍾家潭之港也今雖斷㳅港瀝儼然若能開浚􅢙港徑取大溪之水東入沙港一則水勢徑順入溪必多二則洪水汛漲之時水與湍沙順流俱東不被橫挾入港姑存所聞以俟來者水喉食喉氣喉峴考郡志所載引水于州北鑿兩池以停之淫潦汜溢則城之東北隅有二堨以泄于江目之曰食喉氣喉注云水自離入不有二堨以泄之嵗旱則有火災紹定元年守胡矩聞諸朝廷禁民立屋以塞二堨且欲浚𨗳必時隄防必謹然不眀言堨之所在峴詢諸耆老僅知來歷氣喉堨視食喉稍大經都稅務歬在東渡門墻下以版為閘潮長則與板平市河之水充溢則啓閘以泄於江食喉堨視氣喉稍小在市舶務之南墻下止用泄水却不通潮又有水喉一堨亦以泄水若夫二池人謂蛟池蜃池是也郡志止説清瀾池及府池而亦不言蛟蜃二池在何埊或謂蜃池湮廢已久今為民居堨與池雖無與于堰而水源皆出于它山實關一郡之氣脈故併及之積年沙淤處馬家營西至孫家橋五十二丈六尺孫家橋至許家橋七十丈許家橋西至潘知府宫前一百丈潘知府宫前西至萬家道頭九十丈萬家道頭南至吳家橋一百五十四丈八尺吳家橋南至它山堰口四十七丈王侯名爵侯封廟額侯姓王諱元暐琅琊人也見蘇為記唐太和七年以朝議郎行鄮縣令上柱國築它山堰浚小江湖民德之立祠堰傍爵曰侯諡善政見鄞志而不言何代所封乾道四年邑人朱世彌等請賜廟額增封爵省牒云奏內稱在唐已封善政侯歷年既久元封文字不存難以于侯爵上加封兼本朝自來未曾封賜廟額宜勑賜遺德廟寶慶三年邑人復有請時里人王公塈在朝實專主其事亦以元封文字不存仍封善政侯廟額遺德鄞志縣令題名云府學有請立文宣王册文牒碑具載年月姓名唐書地理志云開元中令及以暐為緯俱不同豈唐史有魯魚之誤耶造堰協謀之人堰之造也採公闍黎實佐經營今有祠像在侯之左今俗稱懸慈法師憲帥程公初置淘沙榖田設廳石刻節文它山水灌溉鄞縣管下七鄉民田每年沙漲四季合用淘沙開淤和雇人夫一嵗當一百千本府措置今支一千二百貫文官會委鄞縣丞同鄉官朱中頴將仕等置到田四十畝三角二十九步半上白粳榖一百一十四石一斗五升每季係鄉官收支掌管開淤仍委鄞縣提督己申奏朝廷從申劄下嘉定八年六月日朝散大夫直寶謨閣兩浙東路提點刑獄公事兼知慶元府沿海制置司公事程覃記趙都丞淘沙米田牒魏都大照應據白劄子條具它山水利便宜事件數內一項乞浚河淘沙奉台判呈劉泳沒官田欲就內撥一項充淘沙使用據元承勘司理院推級劉楠供到山田埊坐落價鈔數目內水田二十九畝三角二十五步元契直錢計六百三十一貫七百文九十八陌每年上租米共二十一石一斗奉台判水田一項契書發下縣丞廳租米每年責付雲濤觀認租仍牒魏都大知府照應府司除已將契書發下鄞縣丞廳仰責付雲濤觀交收并給據付雲濤觀及關常平按照應施行外須至公文牒請照應嘉熙三年十月日牒朝請大夫集英殿修撰知慶元軍府兼沿海制置副使趙以夫押淳祐元年十月余參政委淘沙本月初十日興工至二十六日畢自馬家營至堰上水口共五百十三丈為工四千每工支官錢五百文米二升半共官錢計二千五百貫零十七個內二百貫文代鄉民醮願米一百石監董等人日食在內本月十三日興工至二十日畢為工一千每工支官錢一貫五百文不支米錢計一百二十貫文足十一月回沙閘成大卿再委淘沙本月二十四日興工至十一月初八日畢為工一千九百三十二工每工支官錢一貫五百文不支米官錢計四千九百五十一貫零一一百十七文內敕字即陳從原抄建回沙閘淳祐二年八月內陳大卿委提督建造始九月初八日至十一月七日畢同提督制幹林元晉正奏名安劉閘三眼長三丈九尺髙一丈零五寸中一眼濶一丈二尺八寸兩傍各濶一丈一尺柱位四尺東臂石岸八丈石鎚十五層西臂石岸一十八丈石鎚十五層石匠工錢每工支官錢二貫八百文米二升二合計工錢二千九百三貫零二百十七文雜夫每工支官錢一貫五百文計工錢四千四十九貫零五百十七文砌粗石每工支官錢二貫三百文計工錢一百三十九貫一百零十七文買石及松樁石工雜夫官錢共計二萬六百二十貫七十一文十七界看守回沙閘人中一間閘板七片許草四許亞六東一間閘板七片許十二許十五許三十七西一間閘板七片許阿二許阿三許阿四看管閘人每月共支米一石府歷赴倉清領均分回沙閘外淘沙淳祐三年七月初十日八月二十日兩次大飌水湍沙遇閘即止但閘外淤沙約五十餘丈併裏河王家水港岸傍之沙坍洗入港者三十餘丈帥黃大卿壯猷委峴開淘始于九月初二日至初八日畢為工九百八十錢共計一百三十四貫四百文雜支在內洪水灣築堤淳祐三年秋連經大風水衝壞江隄溪㳅走泄峴聞于府黃大卿併委築治始于八月二十八日至九月初七日畢堤髙二丈濶一丈二尺長一十二丈為工三百七十二為錢共計八十七貫二百九十文足請加封善政侯申府列銜狀右峴等居處海濵涵濡聖澤屬當潦嵗轉為豐年旦有顯功理難自默竊見本府鄞縣事以一郡飲食七鄉灌溉皆仰它山之水外􅢙别無大源而鹹潮混雜大為民病兼水大則湧入于河水少則多泄于江建置一堰民到于今享其利血食滋久靈著如初曰雨曰暘有禱必應一郡七鄉之民恃為司命今嵗初淫雨不止稼穡幾壞於垂成鄉人老稚羣禱祠下片雲閣雨霽日開眀屢禱屢孚其答如應今嵗一飽厥有由來緣旦在于唐朝已封善政侯本朝乾道四年邦人有請準省劄仍封善政侯賜遺德廟額兹者恭覩眀堂赦文應諸路保奏旦祠禱祈應驗者並與加封今來善政侯有􅢙莫大之功靈著之迹所合敷况本府近創回沙一閘為民興利迓續神休謹録白封告廟額牒在前具狀申伏望台判備申朝省乞與峻加美號以答旦貺峴等下情不勝真切之禱謹狀設醮紹熙五年因旱府帖小溪鎮祈雨鄉民因許師巫樂龍大三牲旦願小溪監鎮蔣修職子泳立疏隆慶二年夏旱師巫嘗斂鄉民錢物欲償歬願又以人情牽制竟成迤邐近年沙淤日甚或謂旦願未償所致辛丑冬淘沙因稟鄉帥余參政給楮劵五百千代民償願緣三牲用費不資兼不欲擾民又雲濤觀有三清閣之嚴淨及有東嶽行宫之威靈亦不敢用牲牢然未􅍐于旦不敢輕改衆議殊未有處峴恐成因循遂作三􅍐其一命道士改作三清界醮一百二十分以答龍旦并施斛以享堰旦其二命師巫作三界清醮其三用小牲牢三個卜於龍王及善政侯得第一􅍐峴即以其事白之陳帥再得官劵三百千助成醮事時雨雪連綿奏詞之日隂雲解駮日光穿漏自是晴霽邦民感悅皆以為精誠所格四眀它山水利偹覽卷上
