body:
  text: 四眀它山水利偹覽卷下宋魏峴撰重修善政侯祠堂誌祭法徳施扵人則祭之能禦大災能捍大患則祭之是知聲光垂于簡編徳馨饗其廟食者豈徒然哉善政侯琅邪王公諱元暐冊封之典圖志載之偹矣按有唐太和中出佩銅章字人海徼時屬承寛之後躬行阜俗之化以勤儉誡游惰以誠慤崇孝慈貪夫斂手扵衲間暴客屏跡于境外能使㛰嫁有序惸獨有依他民愁嘆我則民諧乎禮樂他民彫敝我則民豐乎衣食詩所謂愷悌君子民之父母者歟先是厥土連江厥田宜稻每風濤作沴或水旱成災不若採石扵山為隄為防迴㳅於川以灌以溉道乎潤下之澤建乎不拔之基能扵嵗時大獲民利故自它山堰溉良田者凡數千頃得非謂法施于人乎能禦大災乎則侯之為政也易俗移風惠其生民沐義浸仁澤及来裔使永永之世猶受其賜者不可勝數則子路治蒲之政西門投巫之酷諒多慚徳矧今海縣晏清哲后求治一司之任非賢弗居太博王君輟玉筍之班假墨綬之秩去民之害必杜其漸興民之利必臻其源佗日響侯之徳聲謁其祠庭則門榛砌草曝露尤甚将何勸民乎吾将新之吏忻民歡風動草偃徴材揆日經之營之于是遷祠之基止堰之上使泛舟者賴其徳力農者懐其恩觀其廟貌翬飛矢棘垣墉蔽虧及其庭也則若聆乎片言升其堂也則如聞虖笑語哉乃潔誠端簡享旦于祠是使遺愛之道載彰嚴祭之禮斯在江之滸佑我蒸民嗚嘑侯之生也以子男之位能以善政被乎俗其歿也以正直之道能以不朽留其旦向若為唐鉅僚列爵重位必能霖雨四海舟航巨川則貞觀不為遼哉知縣太博譽播乎疲俗景慕前哲樹之休聲庶使饗斯之廟者知仁政之可尚也為通理侯藩偹熟徽烈俾旌如在無愧直書其祠堂之棟宇官吏之名氏請附之碑隂時大宋咸平四年嵗次辛丑六月初伏前一日記宣徳郎守殿中丞通判眀州軍州兼市舶騎都尉借緋蘇為撰朝奉郎尚書虞部員外郎知眀州軍州兼市舶上騎都尉賜緋魚袋借紫丁顧書西湖引水記舒亶按州圖經鄞縣南二里有小湖唐貞觀中令王君炤修也盖今里俗所謂細湖頭者乃其故䖏焉湖廢久矣獨其西隅尚存今所謂西湖是也明為洲瀕海枕江水難蓄而善泄嵗小旱則池井皆竭而是湖所以南引它山之水為旱嵗備熈寜乙卯嵗大旱湖涸建中靖國改元之夏秋不雨湖又涸民渇甚至穴窊下濾􅐮滓以飲而國家将有事于郊丘上供之舟復阨不得進公私交病上下狼顧漫不知所為策者州于是以其事属監船塲宣徳郎唐君君即繇南門道河上凡八十有五里抵所謂它山堰者躊躇相視遂盡得其利病盖所謂它山者四明之衆山萃焉一山作雨則澗壑交會出為漫㳅方嵗小旱衆山未必皆不雨而溪㳅未必遂絶也特河勢中窊循兩隄率支渠釃泄以去以故不得行盖非特天時之罪也君既得其所以為利病審其宜矣乃屬民盡堙諸渠口而稍浚上源因以其土窒補堰隙復累石于其上以遏入江之羨㳅扵是水稍引以北顧獨距城十數里河赤地裂深尺餘凡邦之人莫不皆謂水無可行之理要非淹旬積雨莫能濟也君謂審如是豈人力所能及哉頗聞善政王侯實始作堰以兹水賜其邦人廟貌固在也其能漠然乎即為民致禱焉一昔而水輙薄城下不數日湖㳅漫然至清洌可食而行舟于河不復留礙耋穉懽呌里巷相属一方遂以無虞噫侯一何異哉雖然前􅢙湖盖嘗涸矣無有能發其利者發其利自宣徳君始君誠善其始矣顧非後以相之則莫能善其終盖宣徳君身筦庫之責而能用意勤民之事侯生既施勞于人而殁猶烱烱如此盖可謂有志于民而與夫世之任人責而不思憂視民烖而莫知救者顧可同日而語哉侯諱元暐史不𫝊不知何許人也唐太和中實令是邑得之父老它山以北故時皆江也溪㳅猥斥并與潮汐上下水不蓄泄旱潦為災侯為視地髙下伐木斵石横巨㳅而約之率三入江七㳅于河溉田凡八百餘頃其功利博矣故民至今祠之宣徳君名意字居正江陵人也乃祖若父以風節文章聞天下而君清直强學不茍于其職克似其家世者也既徳侯之賜不敢忘斥幣以致飾其像矣又属余以紀其事余以謂天時之不常久矣安知嵗不旱而湖無涸乎故其論如􅢙且以著二君之志而因以告夫後來者使有考焉冬十月令日誌舒公亶引水記云按圖經鄞縣南二里有小湖唐貞觀中令王君炤所修也葢今俗語所謂細湖頭乃其故處也唐地理志載鄮縣注云南二里有小江湖開元中令王元暐置小江湖即日湖也楊䝉引水記云唐人王元暐令鄞始導它山之水作堰江溪約水勢貫城以入瀦為平湖魏行己增修堰記云它山一堰七鄉膏腴無慮千數百頃瀦為平湖疏為長河以待旱乾水溢之患唐志言小江湖王侯所置而記亦言侯置堰瀦湖君炤在貞觀而侯在太和不應貞觀嘗修而太和復言始置豈王君既修之後湖廢而侯復開浚之故言置耶盖湖之為湖久矣它山未堰之前四眀諸山之水多泄于江水不及湖雖修易涸其餘可知它山既堰之後王侯䟽河引水入城復開是湖以為瀦蓄之地若是則雖謂侯置湖可也然舊實有湖不言修而言置何耶夫略有沮洳餘瀝之可因謂之修可也眀之為州東北皆江而西南皆山間一二百里湖在平陽之地水無其源多時必廢為平地眀矣非置而何魏峴記重修它山堰引水記楊䝉四眀澤國也大湖漫其西南大江帶其東北然七八月之交十日不雨則舟膠于河民病暍矣盖湖獨用以溉旁湖之田江又潮汐上下鹵惡而不適用唐人王元暐令鄞始道它山之水作堰江溪約水勢貫城以入瀦為平湖疏為長河掬為幽沼後人徳之爰立廟貌丐請封爵侯曰善政世世祀之嵗久川淤堤墊堰墮人各自私岐分派引旱涸如初先是監船塲宣徳郎唐意往窒其岐派培其堰堤水雖暫至二年復涸議者謂不可復修矣簽幕承議郎張君適蒞其事白于州率邑大夫宣議郎龔君詢其父老相其利害增卑以髙易土以石冶鐡而固之俾潦不至淫旱不至涸肩輿而往操舟而還邦人聚觀歎瞻神速承議君諱必强眀人也盖古所謂不敢欺者宣議君諱行修修政勤民盖古不忍欺者二君相濟公私不擾而厥功告成實徽宗崇寜二年七月二十七日承議郎錢塘楊䝉為之記其詞曰有唐太和王侯始基粤嵗數百民食其利二君嗣功既囦既崇又将永永而無窮湯湯其流泛泛其舟以溉以灌以酌以㳺于以著君之休重修增它山堰記魏行己漢宣帝嘗曰庶民所以安其田里而無愁恨者政平訟理也與我共􅢙者其惟良二千石乎噫若漢宣帝者可謂知治之本所以能中興漢室功光祖宗也今天子挺生上聖之資造中興之業况以民為邦之本加惠于元元者至優至渥方且輟近班之法從殿方面之侯藩躬行阜俗之化専意牧字之仁千里之民何其幸也紹興丙寅農事舉趾而它山之堰縁􅄓風忽起朝汐衝突川淤隄墊堰埭墮圮七鄉民田将就枯涸海波江鹵駸駸瀰漫太守待制秦公憂見顔色乃黙禱神祠使息風濤委督官吏經營强堰然後增葺它山補土石之罅漏塞梁坍之隤穴易土以石冶鉄而固之旬日之間厥功告成非獨使今秋豐稔千里足食且俾斯民永賴其利于無窮古之良二千石雖龔黄不能過也誠可以仰寛東顧之憂上副眀天子委任之意猗歟休哉堰成之日泛舟者謌詠其徳力農者感懐其恩咸謂異時入秉鈞衡登庸華要必能霖雨四海舟航巨川盖權輿見於􅢙也夫四眀澤國負三江捍兩湖潮汐上下衝接山下其来則溝澮皆盈其去則田疇皆涸所恃以分甘泉鹹鹵者隄防堅固而已方其堅全則均被其利毁决則悉罹其危惟它山一堰所係尤重七鄉之間膏腴無慮千數百頃瀦為平湖䟽為長河以待旱乾水溢之患皆它山一堰之利是以今春偶經墊决環境之民惶怖憂恐所謂鳩工積累公帑私財不擾不費若有旦助成以不日皆太守待制秦公至誠之所感也邦人徳之形于歌頌行己偶奉府檄實董其事不敢嘿而不書大宋紹興十六年餘月望日知明州鄞縣丞魏行己謹誌四眀重建烏金堨記出城南五十五里有堰曰它山唐鄞令王侯諱元暐所建水自越之上虞歴四眀山萬壑争㳅演迤砰湃南注于江自堰之立約水入河乗除有數鄞西七鄉為田數千頃藉以灌溉其㳅貫扵城之日月湖闔郡之人飲焉食焉泳焉㳺焉堰之利博矣然視水之大小而隄防者堨之助為多埜老謂侯繇堰口浮三瓢聽所之而立殆旦其事今自堰出東十有五里為烏金又東三里為積瀆又東二十七里為行春皆相地之宜而為之節惟烏金首枕上㳅嵗久堆圯人情往往拘閡因仍茍簡日就湮塞莫有興其廢者沙淤愈甚河㳅易涸公私交困嘉定辛巳耆老合辭以請少保大丞相魯素知本末慨然下其事扵郡且俾峴效規畫之愚迺計工賦材選州縣官主之委里士為人信服有計知者督其役出給調度皆不屬吏民以不擾而咸勸趨於是従旁開濬低舊趾二尺許身東西五丈二尺有竒南趾七尺臂東二十七丈西十三尺橋五丈五尺而長髙九尺濶稱之合石為之櫃植石為之櫺䂓撫宏壮工力縝宻時少卿余公建監簿章公良朋相繼来牧皆捐金佐費始終其成初郡併請修行春築朱瀨堰浚江東道士堰河至是悉以次就緒盖給于朝者錢十萬助于郡者四百萬總為工萬有九千越三月而畢邦人舉手加額曰願有紀峴世居溪之濵與田夫野叟念此至熟兹幸賛是役則叙次事實不當以固陋辭切惟是堨昉建扵有唐太和中距今數百載補罅苴漏寜無其人而莫有記嵗時之詳者獨元祐六年二月十六日重修有石刻在實吕公大防當軸時也君明臣良百廢具舉相望餘兩甲子今相國復推廣公徳志切為民惟此邦無窮之利視元祐成績有光矣或曰相國霖雨四海普濟萬世一水利之興顧何足以頌勲徳之盛峴曰不然謝文靖晉室賢輔淝水之功偉矣絶口不言而拳拳扵召伯之一埭愛人利物大臣之用心固如此是不可不書餘皆載之碑隂十二月旦朝奉郎提舉福建路市舶魏峴記并書迴沙閘記林元晉慶元表東海地枕江抱湖水政舉則多豐年不則為沴淳祐改元冬可齊陳公由少司農以秘閣修撰出鎮兼置制沿海二年春開藩諏連嵗失稔之故父老曰是邦儲水而唘閉以時者曰堨泄而不防則乾積而不釃則溢嵗久多圮民甚患之夏澇公剏堨一曰保豐復堨二曰斗門曰大河橋修堨號為喉者三曰食曰水曰氣是嵗東西淛俱歉于澇明獨有秋公曰今所導者㳅爾盍治其源城内外為湖為港鄞西七鄉以飲以溉皆源于它山而邦人知其利未知其害者居半也它山而上則又大溪為之源越水所注夹岸沙彌望雨則與水俱下長官堰下上級皆三十六其上沙没殆盡下不没者五六梅梁夭矯之状不可復見其盪于溪者數里溪㳅㡬斷于是井皆汲鹵水田若竭澤嵗浚至三四役工數萬計民亦勞止間有暴漲自西岸而下堙塞尤甚一日公顧其属林元晉曰岸之防固未易圖而浚治之繁其可無簡要之䇿與其浚于既積不若遏于未至水輕清居上沙重濁居下宜閘以止之水平則唘通道如故沙聚于外則去之易為力會新吉州魏侯峴以書備述鄉氓意與公合卜于長官祠又合迺度地吳橋去大溪五十尋近經始營之侯家谿上疏它山之澤夙備肯總其事佐以新進士安居劉合志堅久起秋八月戊寅迄今十月丁丑無一日不晴霽是乃天之所助人心大懌公命元晉記之夫水之利若害判于反覆手禹川漢渠䟽濬釃𨗳不遑暇何古人拳拳加意而近世率視為故嘗也公家古靈先生受業胡安定之門淵源所漸逺矣體用之學公得其𫝊大抵推所學以達諸政尠不自其心始多事者為民不能専多愆者及民不能詳公澹然政尚清簡見明行果于利民一無所靳蠲近租六十萬積平糴本百萬惠猶以為小要未可以施諸是邦者限量也唐僧元亮賦堰詩有曰海潮從此作回期人謂絶唱長官距今四百十六年始有繼其志者堰之于潮閘之于沙古今一轍爾邦人又将世世為美談公名塏長樂人餘月庚戍從事郎時差沿海制置使司幹辦公事林元晉記奉議郎新除大理寺簿趙隆書奉議郎主管建康府崇禧觀應繇篆盖它山歌詩唐僧元亮它山堰堰在四眀之鄞縣一條水出兩眀山晝夜長㳅如白練連接大江通海水鹹潮直到深潭裏淡水雖多無計停半邑人民田種費太和中有王侯令清優為官立民政昨因祈禱入山行識得水源知利病擢舟直到溪碞畔極目江山波濤漫略謼父老問来繇便設機謀造其堰叠山横鋪兩山嘴截斷鹹潮積溪水灌溉民田萬頃餘􅢙謂齊天功不毁民間日用自不知年年豐稔因阿誰山邉郤立它旦廟不為長官興一祠本是長官治􅢙水却将飲食祭閒鬼時人若解感􅢙恩年年祭拜王元暐又詩前人截斷寒㳅叠石基海潮從此作回期行人自老青山路澗急水聲無絶時題它山兼簡鄞令舒亶嗚呼王封君心事鬼出没驅山截長江化作雲水窟旱火六月天萬棟挂龍骨蕭條一祠宇像設何髣髴破屋夜見星漏雨濕衫笏杯酒謝車篝兹事恐亦忽我聞古先王報施亦稱物矧今崇神宫民力未言屈豈無制作年一為起荒茀李侯仁賢資撫字良矻矻何但清似水方㸔健如鶻沈蹟千載後行且見披拂隂功世易忘逺慮俗多吻勉哉君毋遲斯民久已欝粹老使君前被召約住它山既不果以書見抵謂可歎惜併示廣徳湖新記因成詩一首舒亶長江滚滚西南㳅秋水時至狂不收大浪似屋山欲浮王侯旦智禹所啾萬鬼啄石它山幽梅梁屭屭卧龍虬咄嗟湍駭就斂揫巨靈縮手愚公羞障成十里沙中洲支分股引聽所求水旱稽浸民不憂那得蟲蝗隨督郵汙邪甌窶滿車篝斯民飽暖何所醻廟灘突兀寒灘頭嵗嵗雞黍祠春秋老農擊鼓稚子謳當時人物紛雁鷗豈無鼎食腰金儔朽骨往往空蒿丘姓名㡬復人間留惟侯惠施膏如油江聲浩浩飌颼颼千古不見使人愁拔俗萬丈山標崷使君不減裴商州下軍百螙隨鋤耰一笑四境無瘡疣天閑老歩須驊騮已聞歸作金華逰飲賢訪七意未休畫船載酒岸鳴騶絡繹與我置脯䐹冠盖紛紛暇莫偷搔首暢望情綢繆我問使君亦何尤西湖萬頃蛟龍湫㡬年荒茀今則修鼛鼓勿勝財不掊長堤岌嶪髙岑樓㵼有澮􅀆蕩有溝餘波北注引漕舟桑麻被野禾連疇鶴鶴白鳥雜魚游菰蒲菱芡饜採摉楊栁成幄䕃道周畊漁謼歌羸病瘳使君之賜侯可侔天邉旌斾㸔悠悠父老雲梯争攀輈地僻借恂恨無繇髙文摛秀春華抽豐碑崒嵂鑱銀鈎千年空􅢙留海陬君知􅢙日思君不還如今日人思侯樓鑰它山堰頭作竒觀百萬雷霆聲不斷誰把并州快剪刀平􅗴波瀾成兩段四眀山深水源逺衆壑會溪長漫汗滔天狂潦不可留瀉入長江勢奔竄賢哉唐家王長官欲圖永利輸長算想得慘澹經營時一一山川應飽㸔西偏千嶺相屬聨惟有它山擁東岸遂扵􅢙地築横埭截取衆㳅心自斷斟酌利害不全取髙下參差僅雖半水大七分入于江徐把三分供溉灌支流瀰漫穿郡城脈絡貫通平且緩旱時及􅢙水亦足坐使千年忘旱暵無窮廟祀報元功像設森嚴人敢玩梅梁夭矯有㝠助大患于今尚能捍前輩所作多旦靈日月直是誠心貫後人小知或更易費盡工夫隨破散河堙盍浚謀不集堤斷河傾㳅甚悍富民縮手人受殃仰望古人重興歎老木號風波湛碧畫屏俯仰丹青煥更須積雨㸔驚湍濡足搴裳何足憚去家不逺時一逰短船垂綸㳅可亂八月倘有仙槎来便欲乗之泛天漢史彌寜粲曉輕船掠水飛乗閒来訪長官祠靈巒著色四時畫石瀨有聲千古詩華黍㡬霑膏澤潤甘棠長起後人思伊渠不盡為霖意除却梅梁誰得知無名氏誰将倚天劎斸出天河水傾瀉落人間合流奔至此六丁戰海若横築萬石壘波濤斂潮汐辟易走千里蓄泄有堨深長富源委支派繚村落湖渠貫城市千畦藉灌溉萬井酌清沚偉哉霖雨功千載㳅不已薛叔振官為唐令尹心切禹蒸民叠石㳅川水分波及稼雲萬濤驚不夜千古見如新更有朝宗脈聲容匪獨鄞魏峴一朝堰􅢙水千載粒吾民只仰溪為雨何勞旱望雲四時人飲碧六月稻嘗新㳅出心源澤年年惠我鄞陳數月兩出郊勸農復觀稼始言麥壟春今已稻畦夏女紅綵紝餘丁黄耘耔暇暄涼雖不齊晴雨倐忽乍百豐未為多一歉誠所怕蠲逋廣上恩平糶裁米價毫髪可及民豈不念夙夜昔有王長官築堰它山下惠利久益博神靈此其舍泓深或龍蟄堅屹無蟻罅定為三七分釃為數十汊石梁貫雲濤誰敢著足跨㳅沙從何来疑有物驅駕人力㡬淘浚壅淤仍障壩旦功終􅢙惠去沙而變化視古誰比方鄭白其㳅亞魏峴一堰限溪江七鄉利畊稼鹵汐回東溟多水㳅仲夏仁哉王長官一勞貽永暇長輸不盡澤絶勝晴雨乍旱魃縱肆威恃此不足怕滴水一滴金欲買真無價年来沙作祟耄倪憂日夜役夫􅓩方舉賢帥車方下豐資發公儲嚴祀闡神舍臨㳅肅旌騎問瘼窮隟罅買地開一渠内通水百派山判不可移石級誰敢跨董正有賛府相視皆别駕仍憂堨尾閭置柵抵立埧即􅢙是商霖何必驕陽化它山不可磨錢秦特其亞它山堰應煟十里猶聞震地雷海旦驚懼勒潮迴逰人只愛山川好一飽因誰惠得来和韻魏洽㡬何水作四時雷試去尋源櫂懶迴欲㸔澤民千古様我来不是等閒来謁善政祠魏擕家再謁長官祠桂子風吹逰子衣惠澤至今猶瀚漫官楹雖古自光輝梅梁偃蹇蒼龍伏石級參差白雪飛􅢙埊本非供翫賞騷人到此自忘歸逰它山應樞登陸繇来説四眀它山勝地久馳名龍眠巨堰兩崖下鱷吼奔流一水清瑶閣鐘鳴羣動息金輪鼓奏百旦驚後来水政誰研究肯與雲濤更主盟它山堰陳坰堰雷推動阿香車惠澤均霑十萬家誰任長官身後責迴潮今又見迴沙它山歌詩䟦魏峴人知它山之詩而不知它山之歌歌以言其詩之未盡詩以言其歌之所不欲文不觀其詩無以見亮公之絶唱不觀其歌無以見王侯之始謀予方幼時盖嘗耳其歌之大略矣每以石刻不存為恨咨詢耆老有年于兹近購得墨刻讀之甚憙或疑圖志止載絶句為唐僧元亮所作此刻不載嵗月名稱恐非亮公之筆然即其歌以遡其意如因祈禱入山與夫櫂舟深入之語非亮公距王侯未逺後人其孰能知此耶予因連嵗浚沙之艱而思剏堰之不易雖大書特書亦未足以答侯賜是歌也詎容不𫝊敬摹以夀諸石使歌與詩並行以揚侯千萬祀無窮之澤云四明它山水利偹覽卷下
